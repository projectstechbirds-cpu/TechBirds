# api.techbirdsgroup.com — reverse proxy to gunicorn/uvicorn on 127.0.0.1:8000

upstream techbirds_api {
    server 127.0.0.1:8000 fail_timeout=0;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.techbirdsgroup.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.techbirdsgroup.com;

    ssl_certificate     /etc/letsencrypt/live/techbirdsgroup.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techbirdsgroup.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size 15M;

    # File uploads (documents) can take longer than the default 60s.
    proxy_connect_timeout  30s;
    proxy_send_timeout     120s;
    proxy_read_timeout     120s;

    location / {
        proxy_pass         http://techbirds_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection "";
    }
}
