# www marketing site — techbirdsgroup.com
# Static SPA built from apps/www served from /var/www/techbirds/www/dist.

server {
    listen 80;
    listen [::]:80;
    server_name techbirdsgroup.com www.techbirdsgroup.com;
    return 301 https://techbirdsgroup.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.techbirdsgroup.com;

    ssl_certificate     /etc/letsencrypt/live/techbirdsgroup.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techbirdsgroup.com/privkey.pem;

    return 301 https://techbirdsgroup.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name techbirdsgroup.com;

    ssl_certificate     /etc/letsencrypt/live/techbirdsgroup.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techbirdsgroup.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self' https://api.techbirdsgroup.com; frame-ancestors 'none'" always;

    root /var/www/techbirds/www/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
